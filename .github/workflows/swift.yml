# This workflow will build a Swift project and run tests
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-macos:
    runs-on: macos-26

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "26.4.1"

    - name: Install Homebrew dependencies
      run: |
        brew install ripgrep
        rg --version

    - name: Build
      run: swift build --build-tests --quiet

    - name: Run Swift tests (Swift Testing)
      run: swift test --skip-build --no-parallel --disable-xctest

    - name: Run Swift tests (XCTest)
      run: swift test --skip-build --no-parallel --disable-swift-testing

    - name: Run Foundry-based tests
      if: ${{ env.FOUNDRY_BIN != '' }}
      run: swift run FoundrySwiftTestRunner

    - name: Run release script regression tests
      run: |
        scripts/test-make-foundryswift-framework
        scripts/test-release-build-configuration
        scripts/test-binary-manifest
        scripts/test-package-resolution
        scripts/test-distribution-package-staging
        scripts/test-package-foundry-addon
        scripts/test-release-toolchain

    - name: Build macro artifact bundle (exercise release script)
      env:
        FOUNDRY_SWIFT_INCLUDE_MACOS_X86: 1
      run: scripts/build-macro-artifactbundle "$RUNNER_TEMP/foundryswift-macro-artifact" "0.0.0-ci"
