name: DocC

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate DocC
        env:
          DOCC_OUTPUT: ${{ github.workspace }}/.build/docc
          DOCC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          rm -rf "$DOCC_OUTPUT"
          swift package \
            --allow-writing-to-directory "$DOCC_OUTPUT" \
            generate-documentation \
            --target FoundrySwift \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path "$DOCC_BASE_PATH" \
            --source-service github \
            --source-service-base-url https://github.com/${{ github.repository }}/blob/${{ github.ref_name }} \
            --checkout-path . \
            --output-path "$DOCC_OUTPUT"
          DOCS_ENTRY="${DOCC_BASE_PATH}/documentation/foundryswift"
          cat > "$DOCC_OUTPUT/index.html" <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=${DOCS_ENTRY}/">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>FoundrySwift DocC</title>
            </head>
            <body>
              <p>Redirecting to <a href="${DOCS_ENTRY}/">FoundrySwift documentation</a>...</p>
            </body>
          </html>
          EOF
          cp scripts/google1fb990296a5c506c.html "$DOCC_OUTPUT"/
          touch "$DOCC_OUTPUT/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .build/docc

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
